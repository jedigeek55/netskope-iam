<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Netskope IAM</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #0d1b2a 0%, #1b3a5c 100%);
      min-height: 100vh;
    }
    .login-card {
      max-width: 420px;
      width: 100%;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,.4);
    }
    .brand-icon {
      width: 56px; height: 56px;
      background: linear-gradient(135deg, #3b9ddd, #1b6fae);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
    }
    .form-control:focus { border-color: #3b9ddd; box-shadow: 0 0 0 .2rem rgba(59,157,221,.2); }
    .btn-signin {
      background: linear-gradient(135deg, #3b9ddd, #1b6fae);
      border: none; color: #fff; font-weight: 600;
      padding: .6rem 1rem;
    }
    .btn-signin:hover { opacity: .9; color: #fff; }
  </style>
</head>
<body class="d-flex align-items-center justify-content-center py-5">
  <div class="login-card bg-white p-4 p-md-5">

    <div class="text-center mb-4">
      <div class="brand-icon mx-auto mb-3">
        <i class="bi bi-shield-lock text-white fs-4"></i>
      </div>
      <h5 class="fw-bold mb-1">Sign in to continue</h5>
      <p class="text-muted small mb-0">
        You are being authenticated by <strong>IAM Server</strong>
      </p>
    </div>

    {% if error %}
    <div class="alert alert-danger d-flex align-items-center gap-2 py-2 small" role="alert">
      <i class="bi bi-exclamation-triangle-fill flex-shrink-0"></i>
      {{ error }}
    </div>
    {% endif %}

    <form method="post" action="/saml/login">
      <input type="hidden" name="saml_request" value="{{ saml_request }}">
      <input type="hidden" name="relay_state" value="{{ relay_state }}">

      <div class="mb-3">
        <label class="form-label fw-semibold small">Email address</label>
        <div class="input-group">
          <span class="input-group-text bg-light border-end-0">
            <i class="bi bi-envelope text-muted"></i>
          </span>
          <input type="email" name="email" class="form-control border-start-0 ps-0"
                 placeholder="you@example.com" autocomplete="username" required autofocus>
        </div>
      </div>

      <div class="mb-4">
        <label class="form-label fw-semibold small">Password</label>
        <div class="input-group">
          <span class="input-group-text bg-light border-end-0">
            <i class="bi bi-lock text-muted"></i>
          </span>
          <input type="password" name="password" class="form-control border-start-0 ps-0"
                 placeholder="••••••••" autocomplete="current-password" required>
        </div>
      </div>

      <button type="submit" class="btn btn-signin w-100">
        <i class="bi bi-box-arrow-in-right me-1"></i>Sign In
      </button>
    </form>

    <p class="text-center text-muted small mt-4 mb-0">
      <i class="bi bi-lock-fill me-1"></i>Secured by Netskope IAM
    </p>
  </div>
</body>
</html>
