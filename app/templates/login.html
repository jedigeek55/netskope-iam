<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Netskope IAM</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background: linear-gradient(135deg, #0d1b2a 0%, #1b3a5c 100%); min-height: 100vh; }
    .login-card { border: none; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,.3); }
    .login-logo { color: #3b9ddd; font-size: 2.5rem; }
  </style>
</head>
<body class="d-flex align-items-center justify-content-center">
  <div style="width:100%; max-width:400px; padding:1rem">
    <div class="card login-card">
      <div class="card-body p-5">
        <div class="text-center mb-4">
          <i class="bi bi-shield-lock login-logo"></i>
          <h4 class="mt-2 fw-bold">IAM Server</h4>
          <p class="text-muted small">Netskope Identity & Access Management</p>
        </div>

        {% if error %}
        <div class="alert alert-danger d-flex align-items-center gap-2" role="alert">
          <i class="bi bi-exclamation-triangle-fill"></i> {{ error }}
        </div>
        {% endif %}

        <form method="post" action="/ui/login">
          <div class="mb-3">
            <label class="form-label fw-semibold">Email</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-envelope"></i></span>
              <input type="email" name="email" class="form-control" placeholder="admin@example.com" required autofocus>
            </div>
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Password</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock"></i></span>
              <input type="password" name="password" class="form-control" placeholder="Password" required>
            </div>
          </div>
          <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
            Sign In <i class="bi bi-arrow-right ms-1"></i>
          </button>
        </form>
      </div>
    </div>
    <p class="text-center text-white-50 small mt-3">Admin access only</p>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
