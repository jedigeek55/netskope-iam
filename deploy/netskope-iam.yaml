AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Netskope IAM Server - EC2 deployment in the Jedigeek5 Test VPC.
  Provisions a single AL2023 instance with a primary ENI in the public
  subnet (outbound internet via the existing NAT instance, no EIP) and a
  secondary ENI in the private subnet (10.10.2.0/24) which is the only
  network the server is reachable from. Bootstraps via UserData (which runs
  deploy/setup.sh from the cloned GitHub repo). HTTP only, no public access.

# ---------------------------------------------------------------------------
# Prerequisites before deploying:
#   1. Run deploy/create-ssm-params.sh to populate /netskope-iam/* in SSM
#   2. Deploy this stack
#   3. Create a DNS record (or hosts entry): iam.jedigeek5.net -> <Outputs.PrivateIP>
#      for hosts on the 10.10.2.0/24 subnet
# ---------------------------------------------------------------------------

Parameters:
  VpcId:
    Type: String
    Default: vpc-0b9201f819b05240e
    Description: VPC ID - Jedigeek5 Test VPC

  PublicSubnetId:
    Type: String
    Default: subnet-09d1405805a295ead
    Description: Public subnet - hosts the instance's primary ENI (no public IP is assigned)

  PrivateSubnetId:
    Type: String
    Default: subnet-0af58a53bffe0b9c1
    Description: Private subnet (10.10.2.0/24) - IAM server is reachable only from here

  InstanceType:
    Type: String
    Default: t3.small
    AllowedValues: [t3.micro, t3.small, t3.medium]
    Description: t3.small is sufficient; upgrade to t3.medium if sluggish

  AmiId:
    Type: AWS::EC2::Image::Id
    Default: ami-0152204c1a187337c
    Description: AL2023 AMI ID (us-east-1) - update by resolving /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64

  DomainName:
    Type: String
    Default: iam.jedigeek5.net
    Description: FQDN for the IAM server (must point to EIP after stack creates)

  GitHubRepo:
    Type: String
    Default: https://github.com/jedigeek55/netskope-iam.git
    Description: Git repo to clone on first boot

Resources:

  # ── IAM Role ──────────────────────────────────────────────────────────────
  IamServerRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy
      Policies:
        - PolicyName: NetskopeIamSsmParameters
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:GetParametersByPath
                Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/netskope-iam/*"

  IamServerInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref IamServerRole

  # ── Security Group ─────────────────────────────────────────────────────────
  IamServerSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Netskope IAM Server - HTTP from private subnet only, SSH from VPC
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 10.10.2.0/24
          Description: HTTP for IAM web UI, SAML and SCIM endpoints - private subnet only
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 10.10.0.0/16
          Description: SSH management from within VPC only
      Tags:
        - Key: Name
          Value: sg-netskope-iam

  # ── EC2 Instance ───────────────────────────────────────────────────────────
  IamServerInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: !Ref AmiId
      SubnetId: !Ref PublicSubnetId
      SecurityGroupIds:
        - !GetAtt IamServerSG.GroupId
      IamInstanceProfile: !Ref IamServerInstanceProfile
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: 20
            VolumeType: gp3
            DeleteOnTermination: true
      # UserData: minimal bootstrap - clone repo, call setup.sh
      # setup.sh handles all package installs, DB init, SSL, systemd, CloudWatch
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -euo pipefail
          exec > /var/log/iam-userdata.log 2>&1

          echo "=== IAM Server UserData bootstrap starting ==="

          dnf update -y
          dnf install -y git

          git clone ${GitHubRepo} /opt/netskope-iam

          export IAM_DOMAIN="${DomainName}"
          bash /opt/netskope-iam/deploy/setup.sh 2>&1 | tee /var/log/iam-setup.log

          echo "=== UserData bootstrap complete ==="
      Tags:
        - Key: Name
          Value: netskope-iam-server
        - Key: Project
          Value: netskope-iam

  # ── Private subnet interface ────────────────────────────────────────────────
  # Secondary ENI on 10.10.2.0/24 - this is the address clients use to reach
  # the IAM server. The primary ENI (public subnet) keeps outbound internet
  # access for SSM/dnf/pip/git via the existing NAT instance, but has no EIP
  # and is not reachable from outside the VPC.
  IamServerPrivateEni:
    Type: AWS::EC2::NetworkInterface
    Properties:
      SubnetId: !Ref PrivateSubnetId
      GroupSet:
        - !GetAtt IamServerSG.GroupId
      Description: Netskope IAM server - private subnet interface
      Tags:
        - Key: Name
          Value: netskope-iam-private-eni

  # NOTE: IamServerEniAttachment temporarily removed (2026-06-09) - attaching
  # this ENI broke routing for eth0 (SSM/dnf/pip lost connectivity). The ENI
  # itself is retained so its private IP allocation is preserved; it will be
  # re-attached once the instance has policy-based routing configured for
  # secondary interfaces (see deploy/setup.sh).
  # IamServerEniAttachment:
  #   Type: AWS::EC2::NetworkInterfaceAttachment
  #   Properties:
  #     InstanceId: !Ref IamServerInstance
  #     NetworkInterfaceId: !Ref IamServerPrivateEni
  #     DeviceIndex: 1

  # ── CloudWatch Log Groups ──────────────────────────────────────────────────
  AppLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /netskope-iam/app
      RetentionInDays: 30

  NginxLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /netskope-iam/nginx
      RetentionInDays: 14

  SetupLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /netskope-iam/setup
      RetentionInDays: 7

Outputs:
  PrivateIP:
    Description: >
      Private IP on 10.10.2.0/24 - create a DNS record (or hosts entry)
      iam.jedigeek5.net -> this IP for clients on that subnet.
    Value: !GetAtt IamServerPrivateEni.PrimaryPrivateIpAddress

  InstanceId:
    Description: EC2 instance ID (use for SSM Session Manager)
    Value: !Ref IamServerInstance

  IAMServerURL:
    Description: IAM server URL (HTTP only, reachable from 10.10.2.0/24)
    Value: !Sub "http://${DomainName}"

  SamlMetadataURL:
    Description: IdP metadata URL - import into each Service Provider
    Value: !Sub "http://${DomainName}/saml/metadata"

  SSMSessionCommand:
    Description: Open a shell on the instance via SSM (no SSH key needed)
    Value: !Sub "aws ssm start-session --target ${IamServerInstance} --region ${AWS::Region}"

  SetupLogCommand:
    Description: Tail the bootstrap log via SSM
    Value: !Sub >-
      aws ssm start-session
      --target ${IamServerInstance}
      --region ${AWS::Region}
      --document-name AWS-StartInteractiveCommand
      --parameters 'command=["tail -f /var/log/iam-setup.log"]'
